# OpenClaw - 本地AI智能体网关
# 支持多Provider LLM、本地工具调用、多端消息推送

version: '3.8'

services:
  # ==================== Gateway守护进程 ====================
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: openclaw-gateway
    restart: unless-stopped
    ports:
      - "18789:18789"   # WebSocket API
      - "1455:1455"     # OAuth回调
    environment:
      - OPENCLAW_GATEWAY_PORT=18789
      - OPENCLAW_GATEWAY_HOST=0.0.0.0
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENCLAW_STATE_DIR=/data
    volumes:
      - openclaw-data:/data
      - ./config:/app/config:ro
    networks:
      - openclaw-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:18789/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== Web UI ====================
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: openclaw-web
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NEXT_PUBLIC_GATEWAY_URL=ws://gateway:18789
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - COZE_API_KEY=${COZE_API_KEY:-}
      - OPENAI_CODEX_ACCESS_TOKEN=${OPENAI_CODEX_ACCESS_TOKEN:-}
    depends_on:
      - gateway
    networks:
      - openclaw-network

  # ==================== Canvas交互画布（可选） ====================
  canvas:
    image: node:20-alpine
    container_name: openclaw-canvas
    restart: unless-stopped
    ports:
      - "18793:18793"
    volumes:
      - ./canvas:/app
    working_dir: /app
    command: sh -c "npm install && npm start"
    networks:
      - openclaw-network
    profiles:
      - canvas

volumes:
  openclaw-data:
    driver: local

networks:
  openclaw-network:
    driver: bridge
